name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore DistCache.slnx

      - name: Build
        run: dotnet build DistCache.slnx --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test tests/DistCache.Tests/DistCache.Tests.csproj \
            --no-build \
            --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput="${{ github.workspace }}/coverage/coverage.opencover.xml" \
            /p:Threshold=70 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total

      - name: Check coverage file exists
        id: coverage_check
        run: |
          if [ -f "${{ github.workspace }}/coverage/coverage.opencover.xml" ]; then
            # Only treat as valid if it contains actual coverage data (has <Class> elements)
            if grep -q '<Class ' "${{ github.workspace }}/coverage/coverage.opencover.xml" 2>/dev/null; then
              echo "has_coverage=true" >> $GITHUB_OUTPUT
            else
              echo "has_coverage=false" >> $GITHUB_OUTPUT
              echo "::warning::Coverage file exists but contains no class data, skipping summary (no tests written yet)"
            fi
          else
            echo "has_coverage=false" >> $GITHUB_OUTPUT
            echo "::warning::No coverage file found, skipping summary"
          fi

      - name: Coverage summary
        if: steps.coverage_check.outputs.has_coverage == 'true'
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/coverage.opencover.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: "70 80"

      - name: Write coverage to job summary
        if: steps.coverage_check.outputs.has_coverage == 'true' && always()
        run: |
          if [ -f code-coverage-results.md ]; then
            cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
