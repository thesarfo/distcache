syntax = "proto3";

option csharp_namespace = "DistCache.Core.Proto";

package distcache;

import "google/protobuf/empty.proto";

// ── Single-key operations ──────────────────────────────────────────────────

message GetRequest {
  string key_space = 1;
  string key       = 2;
}

message GetResponse {
  bool  found = 1;
  bytes value = 2;
}

message PutRequest {
  string key_space = 1;
  string key       = 2;
  bytes  value     = 3;
}

message DeleteRequest {
  string key_space = 1;
  string key       = 2;
}

// ── Batch operations ───────────────────────────────────────────────────────

message BatchGetRequest {
  string          key_space = 1;
  repeated string keys      = 2;
}

message CacheEntry {
  string key   = 1;
  bool   found = 2;
  bytes  value = 3;
}

message BatchGetResponse {
  repeated CacheEntry entries = 1;
}

message BatchPutEntry {
  string key   = 1;
  bytes  value = 2;
}

message BatchPutRequest {
  string                 key_space = 1;
  repeated BatchPutEntry entries   = 2;
}

// ── Service ────────────────────────────────────────────────────────────────

service CacheService {
  rpc Get     (GetRequest)      returns (GetResponse);
  rpc Put     (PutRequest)      returns (google.protobuf.Empty);
  rpc Delete  (DeleteRequest)   returns (google.protobuf.Empty);
  rpc BatchGet(BatchGetRequest) returns (BatchGetResponse);
  rpc BatchPut(BatchPutRequest) returns (google.protobuf.Empty);
}
